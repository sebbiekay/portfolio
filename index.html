<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Doobie's Portfolio</h1>
    <h2>Experimental playground</h2>
    <nav class="main-nav" aria-label="Primary">
      <button class="active" type="button" onclick="window.location.href='index.html'">Home</button>
      <button type="button" onclick="window.location.href='project-page.html'">Projects</button>
      <button type="button" onclick="window.location.href='aboutme.html'">About Me</button>
    </nav>
  </header>

  <main>
    <p>I dunno, I just like to make stuff.</p>

    <section id="devlog" aria-label="Thoughts and Updates">
      <h3>Thoughts and Updates</h3>
      <div id="devlog-container">
        <p class="devlog-status">Loading updates...</p>
      </div>
    </section>
  </main>

  <script>
    const tsvUrl =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnMuksnF4xa8ipamckFjMRBld-qFSiURv4cImc-M10EMDULMVEeUGztF_FVp6xFobRZRnjyaZt1Kdc/pub?output=tsv";

    function parseTSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === "\"") {
          if (inQuotes && line[i + 1] === "\"") {
            current += "\"";
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "\t" && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      result.push(current);
      return result;
    }

    function normalizeCell(value) {
      return (value || "").trim().replace(/^"|"$/g, "");
    }

    function formatDate(rawDate) {
      const dateObj = new Date(rawDate);
      if (Number.isNaN(dateObj.getTime())) return rawDate || "";
      return dateObj.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
      });
    }

    function renderEntry(container, entry) {
      const div = document.createElement("article");
      div.className = "devlog-entry";
      div.innerHTML = `
        <div class="devlog-date">${entry.date}</div>
        <h4 class="devlog-title">${entry.title}</h4>
        <p class="devlog-body">${entry.body}</p>
      `;
      container.appendChild(div);
    }

    async function loadDevlog() {
      const container = document.getElementById("devlog-container");
      if (!container) return;

      try {
        const response = await fetch(tsvUrl, { cache: "no-store" });
        if (!response.ok) throw new Error("Request failed");

        const text = await response.text();
        const rows = text.split("\n").slice(1);

        const entries = rows
          .reverse()
          .map((row) => {
            if (!row.trim()) return null;
            const columns = parseTSVLine(row);
            if (columns.length < 3) return null;

            const rawDate = normalizeCell(columns[0]);
            const title = normalizeCell(columns[1]);
            const body = normalizeCell(columns[2]);

            return {
              date: formatDate(rawDate),
              title: title || "(No title)",
              body: body || "(No content)",
            };
          })
          .filter(Boolean);

        container.innerHTML = "";

        if (!entries.length) {
          container.innerHTML = '<p class="devlog-status">No updates yet.</p>';
          return;
        }

        renderEntry(container, entries[0]);

        if (entries.length > 1) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "project-cta devlog-show-older";
          button.textContent = "Show Older Entries";
          container.appendChild(button);

          const olderContainer = document.createElement("div");
          olderContainer.className = "devlog-older-list";
          olderContainer.hidden = true;

          entries.slice(1).forEach((entry) => renderEntry(olderContainer, entry));
          container.appendChild(olderContainer);

          button.addEventListener("click", () => {
            const isHidden = olderContainer.hidden;
            olderContainer.hidden = !isHidden;
            button.textContent = isHidden ? "Hide Older Entries" : "Show Older Entries";
          });
        }
      } catch (error) {
        console.error("Devlog failed to load:", error);
        container.innerHTML = '<p class="devlog-status">Could not load updates.</p>';
      }
    }

    loadDevlog();
  </script>

  <script defer src="script.js"></script>
</body>
</html>
